<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>ProxyDeck – Vollständige Demo</title>
  <link rel="stylesheet" href="demo.css?v=20260721-2">
</head>
<body>
  <div class="shell">
    <aside class="sidebar">
      <button class="brand" data-page="dashboard"><span class="logo">P</span><img class="demo-custom-logo" alt="" hidden><strong>proxydeck</strong><em>DEMO</em></button>
      <nav id="nav">
        <button class="active" data-page="dashboard"><span>⌂</span>Übersicht</button>
        <button data-page="proxies"><span>⇄</span>Proxy Hosts <b id="proxyBadge">3</b></button>
        <button data-page="redirects"><span>↗</span>Weiterleitungen</button>
        <button data-page="streams"><span>≋</span>Streams</button>
        <button data-page="certificates"><span>◇</span>Zertifikate</button>
        <button data-page="providers"><span>⌘</span>DNS-Plugins</button>
        <button data-page="health"><span>◉</span>Healthchecks</button>
        <button data-page="users"><span>♙</span>Benutzer</button>
        <button data-page="notifications"><span>♢</span>Benachrichtigungen</button>
        <button data-page="activity"><span>▤</span>Aktivitäten</button>
        <button data-page="traffic"><span>↗</span>Traffic &amp; Hits</button>
        <button data-page="design"><span>⚙</span>Design</button>
      </nav>
      <div class="side-bottom">
        <div class="gateway"><i></i><div><strong>Gateway online</strong><small>IPv4 + IPv6 aktiv</small></div></div>
        <div class="profile"><span>MM</span><div><strong>Max Mustermann</strong><small>Administrator</small></div><button id="logout">Logout</button></div>
      </div>
    </aside>

    <main>
      <header><button class="mobile-menu" id="mobileMenu">☰</button><div><span>ProxyDeck</span><i>/</i><strong id="crumb">Übersicht</strong></div><div class="header-actions"><button title="Demo-Daten zurücksetzen" aria-label="Demo-Daten zurücksetzen" id="reset">↻</button><button title="Dunkelmodus einschalten" aria-label="Darstellung wechseln" id="themeToggle">☾</button></div></header>
      <div class="page" id="page"></div>
    </main>
  </div>

  <dialog id="modal"><form method="dialog" class="modal-card"><div class="modal-head"><div><h2 id="modalTitle"></h2><p id="modalSubtitle"></p></div><button value="cancel">×</button></div><div class="modal-body" id="modalBody"></div><div class="modal-actions"><button value="cancel" class="btn secondary">Abbrechen</button><button type="button" class="btn primary" id="modalSave">Speichern</button></div></form></dialog>
  <div class="toast" id="toast"><span>✓</span><div><strong></strong><small></small></div></div>
  <div class="login" id="login"><div class="login-book" aria-hidden="true"><span class="book-back"></span><span class="book-pages"></span><span class="book-cover"><i class="logo">P</i></span></div><form id="loginForm"><div class="login-brand"><span class="logo">P</span><strong>proxydeck</strong></div><span class="demo-pill">INTERAKTIVE DEMO</span><h1>Willkommen zurück</h1><p>Erkunde alle Funktionen der ProxyDeck-Oberfläche.</p><label>Benutzername<input id="demoLoginUser" value="admin" required></label><label>Passwort<input id="demoLoginPassword" type="password" value="proxydeck-demo" required></label><div class="login-error" id="demoLoginError"></div><small>Demo-Zugang: admin / proxydeck-demo</small><button class="btn primary">Anmelden</button></form></div>
  <script src="providers.js"></script>
  <script src="notifications.js"></script>
  <script src="demo.js?v=20260721-2"></script>
  <script src="theme.js"></script>
</body>
</html>
